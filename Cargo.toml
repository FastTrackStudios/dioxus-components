[workspace]
resolver = "3"
members = ["dioxus-kit-core", "dioxus-kit", "preview", "dioxus-attributes"]
exclude = ["test-harness"]

[workspace.dependencies]
dioxus-kit-core = { path = "dioxus-kit-core" }
dioxus-kit = { path = "dioxus-kit" }

tracing = { version = "0.1", features = ["std"] }

dioxus = "0.7.8"
dioxus-rsx = "0.7.8"

[profile.release]
opt-level = "z"
debug = false
lto = true
codegen-units = 1
strip = true
incremental = false

[profile.dev]
debug = 0

[profile.dev.build-override]
opt-level = 3
codegen-units = 1
