[workspace]
resolver = "3"
members = ["primitives", "preview", "dioxus-attributes"]
# `test-harness` is its own workspace so it can pin every dioxus crate to the
# PR https://github.com/DioxusLabs/dioxus/pull/5323 fork without disturbing
# the existing crates.io-based resolution used by `primitives` and `preview`.
exclude = ["test-harness"]

[workspace.dependencies]
dioxus-primitives = { path = "primitives" }

dioxus = "0.7.0"
tracing = { version = "0.1", features = ["std"] }

[profile.release]
opt-level = "z"
debug = false
lto = true
codegen-units = 1
strip = true
incremental = false
