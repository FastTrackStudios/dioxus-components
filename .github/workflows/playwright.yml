name: Playwright Tests

on:
  push:
    branches:
      - main
    paths:
      - /**
      - preview/**/*.rs
      - preview/**/Cargo.toml
      - primitives/**/*.rs
      - primitives/**/Cargo.toml
      - .github/**
      - Cargo.toml

  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths:
      - /**
      - preview/**/*.rs
      - preview/**/Cargo.toml
      - primitives/**/*.rs
      - primitives/**/Cargo.toml
      - .github/**
      - Cargo.toml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.53.0-noble
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      # Do our best to cache the toolchain and node install steps
      - uses: actions/checkout@v4
      - name: Install native build tools
        run: apt-get update && apt-get install -y --no-install-recommends build-essential
      - uses: DioxusLabs/dioxus-ci/actions/setup-dioxus@v0.1.0
        with:
          toolchain: 1.88.0
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown
          cache-on-failure: "true"
      - uses: DioxusLabs/dioxus-ci/actions/install-dioxus-cli@v0.1.0
        with:
          version: 0.7.6
      - name: Install dependencies
        run: cd ./playwright && npm ci
      - name: Run Playwright tests
        env:
          CARGO_HOME: /github/home/.cargo
          HOME: /root
          RUSTUP_HOME: /github/home/.rustup
        run: cd ./playwright && npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      - name: Upload blob report to GitHub Actions Artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report
          retention-days: 1
